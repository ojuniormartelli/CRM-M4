
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4 Marketing Digital - CRM & Agency Suite</title>
    <link rel="icon" type="image/svg+xml" href="https://picsum.photos/seed/m4crm/32/32">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Error handler to catch issues before React loads
      window.onerror = function(msg, url, line, col, error) {
        console.error("CRITICAL ERROR:", msg, error);
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 40px; color: red; font-family: sans-serif;">' +
            '<h1>Erro de Inicialização</h1>' +
            '<p>O aplicativo falhou ao carregar. Verifique o console do navegador para detalhes.</p>' +
            '<pre style="background: #eee; padding: 10px;">' + msg + '</pre>' +
            '</div>';
        }
        return false;
      };
      console.log("Index.html loaded, waiting for index.tsx...");
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
    <link rel="stylesheet" href="./index.css">
</head>
<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
